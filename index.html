
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.bootcdn.net/ajax/libs/animate.css/4.1.1/animate.compat.css" rel="stylesheet">
    <title>时钟</title>
    <style>
        body{
            background: #0d1320;
            overflow: hidden;
        }
        #flag{
            margin-top:2vh;
            text-align: center;
            font-size:8vh;
            font-weight: bold;
            color:#e2ecfd;
        }
        #timer{
            text-align: center;
            font-size:40vh;
            font-weight: bold;
            line-height: 40vh;
            color:#e2ecfd;   
        }
        #date{
            margin-top:0px;
            text-align: center;
            font-size:20vh;
            font-weight: bold;
            color:#e2ecfd;
        }
        .about{
            width:600px;
            margin:0 auto;
            padding-top:20px;
            display: flex;
            align-items : center;
        }
        .about .item{
            color:white;
            flex:1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="about">
        <div class="item">
            <a target="_blank" href="https://juejin.im">
                <img style="height:40px;" src="./img/juejin.svg" alt="">
            </a>
        </div>
        <div class="item">
            <a target="_blank" href="https://space.bilibili.com">
                <img style="height:35px;" src="./img/bili.svg" alt="">
            </a>
        </div>
        <div class="item">
            <a target="_blank" href="https://www.zhihu.com">
                <img src="./img/zhihu.svg" alt="">
            </a>
        </div>
        <div class="item">
            <a target="_blank" href="https://github.com">
                <img style="height:20px;" src="./img/github.svg" alt="">
            </a>
        </div>
    
    </div>
    <div id="flag">所谓“<span style="color:#f18a35">996</span>”：9点睡觉9点起床，每天上班6小时</div>
    <div id="timer">06:12</div>
    <div id="date">00月00日</div>
    
    <script>
        let showSymbl = true
        function clock(){
            let now = new Date()
            let hour = now.getHours()+''
            let minute = now.getMinutes() + ''
            let month = (now.getMonth()+1)+''
            let date = now.getDate()+''
            let day = now.getDay()
            if(showSymbl){
                document.getElementById('timer').innerHTML = `${hour.padStart(2,'0')}<span>:</span>${minute.padStart(2,'0')}`
            }else{
                document.getElementById('timer').innerHTML = `${hour.padStart(2,'0')}<span style="color:#0d1320">:</span>${minute.padStart(2,'0')}`
            }

            switch(day) {
                case 0:
                    day='周日'
                    break

                case 1:
                    day='周一'
                    break

                case 2:
                    day='周二'
                    break

                case 3:
                    day='周三'
                    break

                case 4:
                    day='周四'
                    break

                case 5:
                    day='周五'
                    break
                
                case 6:
                    day='周六'
                    break
            }
            document.getElementById('date').innerHTML = `${month.padStart(2,'0')}月${date.padStart(2,'0')}日 ${day}`

            showSymbl = !showSymbl
        }
        clock()
        setInterval(()=>{
            clock()
        },1000)

        setInterval(() => {
            (()=>{
                const nowDate = new Date()
                const nowHours = nowDate.getHours() + ''
                const nowMinutes = nowDate.getMinutes() + ''
                document.getElementById('timer').setAttribute('class', 'animated tada')
                
                setTimeout(() => {
                    document.getElementById('timer').setAttribute('class', '')
                }, 1000)
            })()
        }, 1000*60*30)
    </script>
</body>
</html>
